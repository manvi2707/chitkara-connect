<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Makes the site look correct on mobile screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Browser tab color on mobile -->
    <meta name="theme-color" content="#1e3a8a" />

    <!-- SEO description -->
    <meta
      name="description"
      content="ChitkaraConnect — Faculty Student Portal for Chitkara University. Book meetings, send messages, find faculty."
    />

    <!-- Tab title and favicon emoji -->
    <title>ChitkaraConnect 🎓</title>

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optional: nicer font (you can remove this if not needed) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React mounts the ENTIRE app inside this one div -->
    <div id="root"></div>

    <!-- If JavaScript is disabled, show this message -->
    <noscript>
      You need to enable JavaScript to run ChitkaraConnect.
    </noscript>
  </body>
</html>
